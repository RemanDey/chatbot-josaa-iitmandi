<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <title>JoSAAssist IIT-Mandi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <div class="gemini-shell">
        <!-- Top bar (Gemini-like) -->
        <header class="topbar" role="banner">
            <div class="topbar-left">
                <button id="menu-toggle" class="topbar-icon" aria-label="Toggle menu">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="4" y1="6" x2="20" y2="6"></line>
                        <line x1="4" y1="12" x2="20" y2="12"></line>
                        <line x1="4" y1="18" x2="20" y2="18"></line>
                    </svg>
                </button>

                <img
                    src="{{ url_for('static', filename='logo.png') }}"
                    alt="JoSAAssist logo"
                    class="topbar-logo"
                />

                <div class="topbar-brand">JoSAAssist · IIT-Mandi</div>
            </div>

            <div class="topbar-actions">
                <button id="new-chat-btn" class="topbar-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span class="topbar-btn-text">New chat</span>
                </button>

            </div>
        </header>

        <aside class="sidebar" id="sidebar" aria-label="Chat sidebar">
            <div class="sidebar-top">
                <!-- Mobile close button (hidden on desktop via CSS) -->
                <div class="sidebar-mobile-header">
                    <div class="sidebar-title">Navigation</div>
                    <button id="sidebar-close" class="sidebar-close" aria-label="Close sidebar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="sidebar-links">
                    <button class="sidebar-btn" onclick="window.open('https://josaa.nic.in/', '_blank')">
                        JosAA
                    </button>
                    <button class="sidebar-btn" onclick="window.open('https://www.iitmandi.ac.in', '_blank')">
                        IIT Mandi
                    </button>
                    <button class="sidebar-btn" onclick="window.open('https://linktr.ee/IITs_JoSSA_Helpdesk_Links', '_blank')">
                        Other Links
                    </button>
                    <button class="sidebar-btn" onclick="window.location.href='/about';">
                        About
                    </button>
                </div>
            </div>

            <hr class="sidebar-divider" />

            <div class="sidebar-history" aria-label="Recent chats">
                <div class="sidebar-history-header">
                    <div class="sidebar-history-title">Recents</div>
                    <button id="clear-recents" class="sidebar-clear" type="button" aria-label="Clear chat history">
                        Clear
                    </button>
                </div>

                <div id="history-sidebar" class="history-items"></div>
            </div>

            <div class="sidebar-bottom">
                <p class="footer-text"><a href="/about">Made by Aryan Raj and Reman Dey</a></p>
            </div>
        </aside>

        <main class="chat-container">

            <div id="chat-messages" class="chat-messages">
                <div class="greeting-panel">
                    <h2>Hello. How can I help you today?</h2>
                </div>
            </div>
            <div class="chat-input-area">
                <form id="chat-form" class="chat-input-form">
                    <textarea id="chat-input" placeholder="Ask anything related to JOSAA IIT MANDI..." rows="1"></textarea>
                    <button type="submit" id="send-btn" class="send-btn" title="Send">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 L4.13399899,1.16346273 C3.34915502,0.9 2.40734225,1.00636533 1.77946707,1.4776575 C0.994623095,2.10604706 0.837654326,3.0486314 1.15159189,3.99021575 L3.03521743,10.4310088 C3.03521743,10.5881061 3.19218622,10.7452035 3.50612381,10.7452035 L16.6915026,11.5306905 C16.6915026,11.5306905 17.1624089,11.5306905 17.1624089,12.0019827 C17.1624089,12.4744748 16.6915026,12.4744748 16.6915026,12.4744748 Z"></path>
                        </svg>
                    </button>
                </form>
                <p class="footer-disclaimer">© 2026 JoSAAssist IIT-Mandi. All rights reserved.<br><a href="/about">Made by Aryan Raj and Reman Dey</a></p>
            </div>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
